<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>간이 AR 체험</title>
<style>
body { margin:0; overflow:hidden; }
#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
  display:flex;
  flex-direction:column;
  gap:8px;
}
#status, button{
  background:rgba(0,0,0,0.7);
  color:#fff;
  border:none;
  border-radius:6px;
  padding:8px 12px;
  font-size:14px;
}
.ar-button{
  background:rgba(0,0,0,0.85)!important;
  border:1px solid rgba(255,255,255,0.5)!important;
}

#introGuide{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.guideBox{
  background:#111;
  padding:25px;
  border-radius:12px;
  color:white;
  text-align:center;
  max-width:300px;
}

.guideBox h2{
  margin-top:0;
}

#btnCloseGuide{
  margin-top:15px;
  background:#444;
  border:none;
  color:white;
  padding:8px 14px;
  border-radius:6px;
}
</style>
</head>
<body>

<div id="ui">
  <div id="introGuide">
    <div class="guideBox">
      <h2>🌕 Web AR 달 체험</h2>
      <p>1. AR 버튼을 눌러 시작하세요</p>
      <p>2. 화면을 탭하면 노란 보름달이 나타납니다</p>
      <p>3. 달 근처에 있는 토끼를 탭하면 달이 멈춥니다</p>
      <p>4. 달을 탭하면 달이 점점 어두워집니다</p>
      <p>5. 1번 더 달을 탭하면 붉게 변합니다</p>
      <p>6. 오른쪽 위의 X를 누르면 AR이 종료됩니다</p>
      <p>7. <주위의 모습을 달과 함께 캡쳐해 보세요><br><AR화면에서 직접 촬영은 불가능합니다></p>
      <button id="btnCloseGuide">닫기</button>
    </div>
  </div>
  <div id="status">초기화 중...</div>
  <button id="btnGuide">📸 캡처/녹화 방법 안내</button>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';

let scene, camera, renderer;
let moon, moonGroup;
let bunnySprite=null;

let phase=0;
let stopRotation = false;
let eclipseProgress=0;

let particles=[];
let raycaster=new THREE.Raycaster();
let lastPointer={x:0,y:0,time:0};

let moonTouchedOnce=false;
let moonTouchedTwice=false;

const status=document.getElementById("status");
const btnGuide=document.getElementById("btnGuide");
const introGuide=document.getElementById("introGuide");
const btnCloseGuide=document.getElementById("btnCloseGuide");

btnCloseGuide.onclick=()=>{
  introGuide.style.display="none";
};

// ======== 네이버 앱 감지 & Chrome/Samsung 이동 ========
(function(){
  const ua = navigator.userAgent.toLowerCase();
  const isNaver = ua.includes("naver");
  const isAndroid = ua.includes("android");

  if(isAndroid && isNaver){
    const choice = confirm(
      "네이버 앱 브라우저에서는 AR이 지원되지 않습니다.\n\n" +
      "Chrome 또는 Samsung Internet에서 열어주세요."
    );

    if(choice){
      const urlPath = location.href.replace(/^https?:\/\//, "");
      // Chrome Intent
      const chromeIntent = "intent://" + urlPath + "#Intent;scheme=https;package=com.android.chrome;end;";
      // Samsung Internet Intent
      const samsungIntent = "intent://" + urlPath + "#Intent;scheme=https;package=com.sec.android.app.sbrowser;end;";

      // 기본적으로 Chrome Intent 시도
      window.location.href = chromeIntent;
      return; // 이동했으므로 init 종료
    } else {
      alert("네이버 앱에서는 AR이 지원되지 않습니다.");
    }
  }
})();

// ======== 기존 WebXR AR 초기화 ========
init();

function init(){

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.01,20);

  renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.xr.enabled=true;
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1.2));

  renderer.domElement.addEventListener('pointerup', e=>{
    lastPointer.x=e.clientX;
    lastPointer.y=e.clientY;
    lastPointer.time=performance.now();
  });

  const controller=renderer.xr.getController(0);
  controller.addEventListener("select", onSelect);
  scene.add(controller);

  if ('xr' in navigator) {
    navigator.xr.isSessionSupported('immersive-ar')
    .then((supported)=>{
      if(supported){
        status.innerText="AR 버튼을 눌러 시작하세요.";
        const btn=ARButton.createButton(renderer,{requiredFeatures:['local-floor']});
        btn.classList.add("ar-button");
        document.body.appendChild(btn);

        renderer.xr.addEventListener("sessionstart",()=>{
          status.innerText="화면을 탭하면 보름달이 나타납니다 🌕";
          introGuide.style.display="none";
        });

        renderer.xr.addEventListener("sessionend", resetScene);

      }else{
        status.innerText="❌ immersive-ar 미지원 기기";
      }
    });
  } else {
    status.innerText="❌ WebXR 미지원 브라우저";
  }

  renderer.setAnimationLoop(render);
}

function resetScene(){
  if(moonGroup) scene.remove(moonGroup);
  if(bunnySprite) scene.remove(bunnySprite);
  particles.forEach(p=>scene.remove(p));

  moonGroup=null;
  moon=null;
  bunnySprite=null;
  particles=[];
  phase=0;
  eclipseProgress=0;
  moonTouchedOnce=false;
  moonTouchedTwice=false;

  status.innerText="AR 버튼을 눌러 시작하세요.";
  stopRotation = false;
}

function onSelect(){

  if(phase===0){
    createMoon();
    spawnBunny();
    phase=1;
    status.innerText="🌕 달과 토끼가 나타났어요!";
    return;
  }

  const now=performance.now();
  const usePointer=(now-lastPointer.time<200);
  const x=usePointer?(lastPointer.x/window.innerWidth)*2-1:0;
  const y=usePointer?-(lastPointer.y/window.innerHeight)*2+1:0;

  raycaster.setFromCamera({x,y},camera);

  if(bunnySprite && raycaster.intersectObject(bunnySprite).length){

    scene.remove(bunnySprite);
    bunnySprite = null;

    stopRotation = true;
    moonGroup.rotation.set(0, -Math.PI / 2, 0);

    status.innerText="🌕 익숙한 달 앞면으로 멈췄어요!";
    return;
  }

  const moonHit = moon && raycaster.intersectObject(moon).length;
  if(!moonHit) return;

  if(phase===1 && !moonTouchedOnce){
    moonTouchedOnce=true;
    createParticles(moonGroup.position);
    phase=2;
    eclipseProgress=0;
    moon.material.uniforms.eclipseActive.value=true;
    status.innerText="🌘 월식 시작!";
    return;
  }

  if(phase===2 && !moonTouchedTwice){
    moonTouchedTwice=true;
    createParticles(moonGroup.position);
    phase=3;
    moon.material.uniforms.phase.value=2.0;
    status.innerText="🌑 붉은 달!";
    return;
  }
}

function createMoon(){

  const loader=new THREE.TextureLoader();
  moonGroup=new THREE.Group();

  const mat=new THREE.ShaderMaterial({
    uniforms:{
      map:{value:loader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg')},
      eclipse:{value:0},
      eclipseActive:{value:false},
      phase:{value:0},
    },
    vertexShader:`
      varying vec2 vUv;
      varying vec3 vNormal;
      void main(){
        vUv=uv;
        vNormal=normalize(normalMatrix*normal);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
      }
    `,
    fragmentShader:`
      uniform sampler2D map;
      uniform float eclipse;
      uniform bool eclipseActive;
      uniform float phase;
      varying vec2 vUv;
      varying vec3 vNormal;

      void main(){

        vec3 c=texture2D(map,vUv).rgb;

        // 밝기 보정
        c = pow(c, vec3(0.9));

        // 자연스러운 달빛 노란톤 추가
        vec3 moonYellow = vec3(1.0, 0.88, 0.6);
        c *= moonYellow;

        // 살짝 발광 느낌
        c *= 1.2;

        if(eclipseActive){
          float e=smoothstep(-1.+eclipse,-0.2+eclipse,vNormal.x);
          c*=mix(0.3,1.,e);
        }

        if(phase>1.5){
          c=vec3(c.r*1.2,c.g*0.6,c.b*0.55);
        }

        gl_FragColor=vec4(c,1.);
      }
    `
  });

  moon=new THREE.Mesh(new THREE.SphereGeometry(0.15,64,64),mat);
  moonGroup.add(moon);

  const cam=renderer.xr.getCamera(camera);
  const dir=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
  moonGroup.position.copy(cam.position).add(dir.multiplyScalar(1.5));

  scene.add(moonGroup);
  stopRotation = false;
}

function spawnBunny(){

  const size=512;
  const canvas=document.createElement('canvas');
  canvas.width=canvas.height=size;
  const ctx=canvas.getContext('2d');

  ctx.clearRect(0,0,size,size);

  // 귀여운 만화 스타일 토끼
  const bodyColor="#f7f7f7";
  const blushColor="rgba(255,160,180,0.35)";

  ctx.fillStyle=bodyColor;
  ctx.beginPath();
  ctx.ellipse(256,350,120,130,0,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(256,210,115,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(205,70,40,140,0,0,Math.PI*2);
  ctx.ellipse(307,70,40,140,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#ffd6de";
  ctx.beginPath();
  ctx.ellipse(205,90,18,95,0,0,Math.PI*2);
  ctx.ellipse(307,90,18,95,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#222";
  ctx.beginPath();
  ctx.arc(220,210,10,0,Math.PI*2);
  ctx.arc(292,210,10,0,Math.PI*2);
  ctx.fill();

  ctx.lineWidth=6;
  ctx.lineCap="round";
  ctx.strokeStyle="#222";
  ctx.beginPath();
  ctx.moveTo(246,240);
  ctx.lineTo(256,250);
  ctx.lineTo(266,240);
  ctx.stroke();

  ctx.fillStyle=blushColor;
  ctx.beginPath();
  ctx.arc(190,235,25,0,Math.PI*2);
  ctx.arc(322,235,25,0,Math.PI*2);
  ctx.fill();

  const texture=new THREE.CanvasTexture(canvas);

  bunnySprite=new THREE.Sprite(
    new THREE.SpriteMaterial({
      map:texture,
      transparent:true
    })
  );

  bunnySprite.scale.set(0.5,0.5,1);

  const side=Math.random()<0.5?-1:1;
  bunnySprite.position.copy(moonGroup.position)
    .add(new THREE.Vector3(side*1.0,0,0));

  scene.add(bunnySprite);
}

function createCircleTexture(){
  const size=64;
  const canvas=document.createElement('canvas');
  canvas.width=canvas.height=size;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(size/2,size/2,size/2,0,Math.PI*2);
  ctx.fill();
  return new THREE.CanvasTexture(canvas);
}

function createParticles(position){

  const geometry=new THREE.BufferGeometry();
  const count=60;
  const positions=[];
  const velocities=[];

  for(let i=0;i<count;i++){
    positions.push(position.x,position.y,position.z);
    velocities.push(
      (Math.random()-0.5)*0.03,
      (Math.random()-0.5)*0.03,
      (Math.random()-0.5)*0.03
    );
  }

  geometry.setAttribute('position',
    new THREE.Float32BufferAttribute(positions,3)
  );

  const material=new THREE.PointsMaterial({
    map:createCircleTexture(),
    size:0.05,
    transparent:true,
    blending:THREE.AdditiveBlending,
    depthWrite:false
  });

  const points=new THREE.Points(geometry,material);
  points.userData={velocities,life:1,twinkleOffset:Math.random()*10};
  scene.add(points);
  particles.push(points);
}

function updateParticles(){

  const time=performance.now()*0.005;

  particles.forEach((p,i)=>{
    const pos=p.geometry.attributes.position.array;
    const vel=p.userData.velocities;

    for(let j=0;j<vel.length/3;j++){
      pos[j*3]+=vel[j*3];
      pos[j*3+1]+=vel[j*3+1];
      pos[j*3+2]+=vel[j*3+2];
    }

    p.geometry.attributes.position.needsUpdate=true;

    p.userData.life-=0.015;
    p.material.opacity=
      p.userData.life*
      (0.5+0.5*Math.sin(time+p.userData.twinkleOffset));

    if(p.userData.life<=0){
      scene.remove(p);
      particles.splice(i,1);
    }
  });
}

function render(){

  if(moonGroup && !stopRotation){
    moonGroup.rotation.y+=0.003;
  }

  if(phase===2 && eclipseProgress<1){
    eclipseProgress+=0.003;
    moon.material.uniforms.eclipse.value=eclipseProgress*2;
  }

  updateParticles();
  renderer.render(scene,camera);
}

btnGuide.onclick=()=>{
  alert(
    "📸 AR 화면 캡처/녹화 안내\n\n"+
    "• 캡처: 전원 + 볼륨 하단\n"+
    "  (사용버튼은 개인설정에 따라 달라질 수 있습니다.)\n"+
    "• 녹화: 상단 알림창 → 화면 녹화\n\n"+
    "웹 AR은 브라우저 합성 화면이므로\n"+
    "웹 내부 저장은 불가능합니다."
  );
};

</script>
</body>
</html>
